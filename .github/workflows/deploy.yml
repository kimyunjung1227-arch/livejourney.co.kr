# push to master 시 GitHub Pages 자동 배포 (로컬 빌드 실패 시 CI에서 빌드)
#
# [필수] 저장소 Settings → Pages → Build and deployment → Source: "GitHub Actions" 선택
#        (브랜치 배포만 켜 두면 configure-pages 단계에서 HttpError: Not Found / Get Pages site failed 발생)
#
# GitHub Actions: JS 기반 액션의 Node 20 폐기 대비 — 러너에서 액션을 Node 24로 실행
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
name: Deploy to GitHub Pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.18.1"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: ./web
        run: npm ci

      - name: Build
        working-directory: ./web
        run: npm run build
        env:
          # GitHub Pages 서브경로 (https://owner.github.io/RepoName/) — 필수
          VITE_BASE_URL: "/${{ github.event.repository.name }}/"
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_KAKAO_MAP_API_KEY: ${{ secrets.VITE_KAKAO_MAP_API_KEY }}
          VITE_KMA_API_KEY: ${{ secrets.VITE_KMA_API_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ADMIN_EMAILS: ${{ secrets.VITE_ADMIN_EMAILS }}

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
